<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coming Soon - Desert</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Segoe UI',sans-serif;}
  body{height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background 2s ease;}

  .container{text-align:center;z-index:2;color:white;animation:fadeIn 2s ease;padding:0 20px;}
  h1{font-size:clamp(32px,6vw,52px);letter-spacing:2px;margin-bottom:10px;}
  p{font-size:clamp(14px,2.5vw,18px);opacity:0.85;}

  /* Sun & Moon */
  .sun,.moon{position:absolute;width:clamp(60px,8vw,100px);height:clamp(60px,8vw,100px);border-radius:50%;transition:all 2s ease-in-out;}
  .sun{background:radial-gradient(circle,#ffe29a,#ff8c42);box-shadow:0 0 80px rgba(255,170,50,0.6);}
  .moon{background:#f5f3ce;box-shadow:0 0 40px rgba(255,255,255,0.4);display:none;}

  /* Stars */
  .star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle linear infinite;
  }
  @keyframes twinkle{0%,100%{opacity:0;}50%{opacity:1;}}

  /* Birds */
  .bird{
    position:absolute;
    width:12px;
    height:6px;
    border-left:2px solid rgba(0,0,0,0.75);
    border-bottom:2px solid rgba(0,0,0,0.75);
    transform:rotate(-45deg);
    z-index:3;
    transition: opacity 2s ease;
    will-change: transform;
  }

  /* Fireflies */
  .firefly{position:absolute;width:6px;height:6px;background:yellow;border-radius:50%;opacity:0;animation:blink 2s infinite;transition: opacity 2s ease;}
  @keyframes blink{0%,100%{opacity:0;}50%{opacity:1;}}

  /* Desert SVG */
  .desert{position:absolute;bottom:0;width:100%;z-index:1;}
  .desert path{fill:#d9b382;} /* sand color */
  .desert rect{fill:#3a7d44;} /* plants color */

  @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:600px){h1{font-size:36px;}p{font-size:16px;}}
</style>
</head>
<body>

<div id="stars-container"></div>
<div class="sun" id="sun"></div>
<div class="moon" id="moon"></div>

<div class="container">
<h1>Coming Soon</h1>
<p>Crafting something beautiful in the sands of time.</p>
</div>

<!-- Desert SVG -->
<svg class="desert" viewBox="0 0 1440 320" preserveAspectRatio="none">
<path d="M0,224L80,208C160,192,320,160,480,154C640,149,800,171,960,192C1120,213,1280,235,1440,224V320H0Z"></path>
<!-- Cactus 1 -->
<g transform="translate(1100,180)">
  <rect width="20" height="80"/>
  <rect x="-15" y="20" width="15" height="10"/>
  <rect x="20" y="40" width="15" height="10"/>
</g>
<!-- Cactus 2 -->
<g transform="translate(300,200)">
  <rect width="15" height="60"/>
  <rect x="-10" y="20" width="10" height="8"/>
</g>
</svg>

<script>
let birds = [], fireflies = [], stars = [];
const isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const speedMultiplier = isMobile ? 0.7 : 1;

// Scene update
function updateScene(){
  const now = new Date();
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const time = hours + minutes/60;

  const sun = document.getElementById("sun");
  const moon = document.getElementById("moon");

  let progress = time/24;
  let x = window.innerWidth * progress;
  let y = -400 * Math.pow(progress - 0.5, 2) + (window.innerHeight/2 - 50);

  // Smooth background gradient
  if(time>=6 && time<17){
    document.body.style.background="linear-gradient(to top,#87ceeb,#fdf6e3)";
  } else if(time>=17 && time<19){
    let ratio = (time-17)/2;
    document.body.style.background=`linear-gradient(to top,
      rgba(135,206,235,${1-ratio}), 
      rgba(253,246,227,${1-ratio}), 
      rgba(255,126,95,${ratio}), 
      rgba(254,180,123,${ratio}))`;
  } else {
    document.body.style.background="linear-gradient(to top,#0f2027,#203a43,#2c5364)";
  }

  // Sun & Moon
  if(time>=6 && time<=18){
    sun.style.display="block";
    moon.style.display="none";
    removeStars();
    sun.style.left = x + "px";
    sun.style.top = y + "px";

    createBirds();
    removeFireflies();
    animateBirds();
  } else {
    sun.style.display="none";
    moon.style.display="block";
    moon.style.left = x + "px";
    moon.style.top = y + "px";

    createFireflies();
    removeBirds();
    createStars();
    fadeInFireflies();
    animateBirdsAway();
  }
}

// Birds
function createBirds(){
  if(birds.length>0) return;
  for(let i=0;i<7;i++){
    const b=document.createElement("div");
    b.className="bird";
    b.dataset.progress=0;
    b.dataset.state="normal";
    b.style.top=(50+Math.random()*100)+"px";
    b.dataset.speed=(0.0003+Math.random()*0.0005) * speedMultiplier;
    b.dataset.amplitude=8+Math.random()*12;
    b.dataset.frequency=0.8+Math.random()*1.5;
    b.dataset.phase=Math.random()*Math.PI*2;
    b.style.opacity=0.85;
    document.body.appendChild(b);
    birds.push(b);
  }
}

function animateBirds(){
  birds.forEach(b=>{
    if(b.dataset.state!=="away"){
      let p=parseFloat(b.dataset.progress);
      p+=parseFloat(b.dataset.speed);
      if(p>1){p=0;b.style.top=(50+Math.random()*100)+"px";}
      let x=p*window.innerWidth;
      let amp=parseFloat(b.dataset.amplitude);
      let freq=parseFloat(b.dataset.frequency);
      let phase=parseFloat(b.dataset.phase);
      let y=amp*Math.sin(Math.PI*p*freq + phase) + parseFloat(b.style.top);
      b.style.transform=`translate(${x}px,${y}px) rotate(-45deg)`;
      b.dataset.progress=p;
    }
  });
  requestAnimationFrame(animateBirds);
}

// Birds leaving naturally
function animateBirdsAway(){
  birds.forEach(b=>{
    if(b.dataset.state!=="away"){
      b.dataset.state="away";
      b.dataset.vx=(1.5 + Math.random()*0.8) * speedMultiplier; // horizontal speed
      b.dataset.vy=(-0.8 - Math.random()*0.6) * speedMultiplier; // upward
    }
    let rect=b.getBoundingClientRect();
    let x=parseFloat(rect.left) + parseFloat(b.dataset.vx);
    let y=parseFloat(rect.top) + parseFloat(b.dataset.vy);
    b.style.transform=`translate(${x}px,${y}px) rotate(-45deg)`;
    b.style.opacity=0.7;
    if(y< -50 || x>window.innerWidth + 50){
      b.remove();
      birds=birds.filter(bird=>bird!==b);
    }
  });
  if(birds.length>0) requestAnimationFrame(animateBirdsAway);
}

function removeBirds(){birds.forEach(b=>b.remove()); birds=[]();}

// Fireflies
function createFireflies(){
  if(fireflies.length>0) return;
  for(let i=0;i<15;i++){
    const f=document.createElement("div");
    f.className="firefly";
    f.style.top=Math.random()*window.innerHeight*0.6+"px";
    f.style.left=Math.random()*window.innerWidth+"px";
    f.style.animationDuration=(1+Math.random()*2)+"s";
    f.style.opacity=0;
    document.body.appendChild(f);
    fireflies.push(f);
  }
}
function fadeInFireflies(){
  fireflies.forEach(f=>f.style.opacity=0.6);
}
function removeFireflies(){fireflies.forEach(f=>f.remove()); fireflies=[];}

// Stars
function createStars(){
  if(stars.length>0) return;
  const container = document.getElementById("stars-container");
  for(let i=0;i<100;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*window.innerHeight*0.5+"px";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.animationDuration=(1+Math.random()*2)+"s";
    container.appendChild(s);
    stars.push(s);
  }
}
function removeStars(){stars.forEach(s=>s.remove()); stars=[];}

updateScene();
setInterval(updateScene,60000);
window.addEventListener('resize',updateScene);
</script>

</body>
</html>
