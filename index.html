<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 2s ease;
    }

    .container {
      text-align: center;
      z-index: 2;
      color: white;
      animation: fadeIn 2s ease;
      padding: 0 20px;
    }

    h1 {
      font-size: clamp(32px, 6vw, 52px);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      font-size: clamp(14px, 2.5vw, 18px);
      opacity: 0.85;
    }

    /* Sun & Moon */
    .sun, .moon {
      position: absolute;
      width: clamp(60px, 8vw, 100px);
      height: clamp(60px, 8vw, 100px);
      border-radius: 50%;
      transition: all 1.5s ease-in-out;
    }

    .sun {
      background: radial-gradient(circle, #ffe29a, #ff8c42);
      box-shadow: 0 0 80px rgba(255, 170, 50, 0.6);
    }

    .moon {
      background: #f5f3ce;
      box-shadow: 0 0 40px rgba(255,255,255,0.4);
      display: none;
    }

    /* Stars */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      background-image: radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0;
      transition: opacity 2s ease;
    }

    /* Desert SVG */
    .desert {
      position: absolute;
      bottom: 0;
      width: 100%;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }
      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>
  <div class="sun" id="sun"></div>
  <div class="moon" id="moon"></div>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>Crafting something beautiful in the sands of time.</p>
  </div>
  <svg class="desert" viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path fill="#e9c46a"
      d="M0,224L80,208C160,192,320,160,480,154C640,149,800,171,960,192C1120,213,1280,235,1440,224V320H0Z">
    </path>
    <g transform="translate(1100,180)">
      <rect width="20" height="80" fill="#2a9d8f"/>
      <rect x="-15" y="20" width="15" height="10" fill="#2a9d8f"/>
      <rect x="20" y="40" width="15" height="10" fill="#2a9d8f"/>
    </g>
    <g transform="translate(300,200)">
      <rect width="15" height="60" fill="#2a9d8f"/>
      <rect x="-10" y="20" width="10" height="8" fill="#2a9d8f"/>
    </g>
  </svg>

  <script>
    function updateScene() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const time = hours + minutes / 60;

      const sun = document.getElementById("sun");
      const moon = document.getElementById("moon");
      const stars = document.getElementById("stars");

      let progress = time / 24;

      let x = window.innerWidth * (1 - progress);
      let y = Math.sin(progress * Math.PI) * (window.innerHeight / 2 - 50) + 50;

      if (time >= 6 && time <= 18) {
        document.body.style.background =
          "linear-gradient(to top, #87ceeb, #fdf6e3)";

        sun.style.display = "block";
        moon.style.display = "none";
        stars.style.opacity = 0;

        sun.style.left = x + "px";
        sun.style.top = (y) + "px";

      } else {
        document.body.style.background =
          "linear-gradient(to top, #0f2027, #203a43, #2c5364)";

        sun.style.display = "none";
        moon.style.display = "block";
        stars.style.opacity = 0.6;

        moon.style.left = x + "px";
        moon.style.top = (y) + "px";
      }

      if (time > 17 && time < 19) {
        document.body.style.background =
          "linear-gradient(to top, #ff7e5f, #feb47b)";
      }
    }

    updateScene();
    setInterval(updateScene, 60000);
    window.addEventListener('resize', updateScene);
  </script>

</body>
</html>
